name: Build and deploy Node.js app to Azure Web App
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm -r --if-present run build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: "/"
      - name: Prepare deployment package
        run: |
          mkdir -p deploy/api-server
          mkdir -p deploy/pug-app
          echo "Checking build outputs..."
          if [ -d "api-server/dist" ]; then
            cp -r api-server/dist deploy/api-server/dist
          else
            echo "Warning: api-server/dist not found"
          fi
          if [ -d "pug-app/pug-app/dist" ]; then
            cp -r pug-app/pug-app/dist deploy/pug-app/dist
          else
            echo "Warning: pug-app/pug-app/dist not found"
          fi
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pug-tv'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
